version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd veglu-front
        - npm ci
    build:
      commands:
        - cd veglu-front
        - echo "NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}" > .env.production
        - npm run build
  artifacts:
    baseDirectory: veglu-front/.next
    files:
      - '**/*'
  cache:
    paths:
      - veglu-front/node_modules/**/*
      - veglu-front/.next/cache/**/*
